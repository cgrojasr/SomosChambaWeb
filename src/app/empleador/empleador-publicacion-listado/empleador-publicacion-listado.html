<div class="container">
  <h2>Listado de Publicaciones</h2>
  <div class="row">
    <div class="col-md-4" *ngFor="let publicacion of publicaciones">
      <app-empleador-publicacion-listado-item [publicacion]="publicacion" (mensajeEventEmitter)="mostrarMensaje($event)"></app-empleador-publicacion-listado-item>
    </div>
  </div>
</div>
